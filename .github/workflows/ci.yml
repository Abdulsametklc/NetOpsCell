name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - services/identity-service
          - services/incident-service
          - services/ai-service
          - services/gamification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "${{ matrix.service }}/requirements.txt"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import sanity check (app.main gercekten yukleniyor mu)
        working-directory: ${{ matrix.service }}
        env:
          PYTHONPATH: .
        run: python -c "from app.main import app; print('OK:', app.title)"

      - name: Run tests
        working-directory: ${{ matrix.service }}
        env:
          PYTHONPATH: .
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "tests/ yok, atlaniyor"
          fi

  docker-build:
    name: docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - services/identity-service
          - services/incident-service
          - services/ai-service
          - services/gamification-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t netopscell-${{ matrix.service }}:ci ${{ matrix.service }}

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
