services:
  # --- Redis: event bus (Streams) --------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Kisi 2: Incident Service ------------------------------------------------------
  incident-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - incident_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  incident-service:
    build: ./services/incident-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@incident-db:5432/incident_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8002"
    depends_on:
      incident-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Kisi 2: AI Service (iskeleti CP3'te eklenecek) --------------------------------
  ai-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ai_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Kisi 2: Gamification Service ---------------------------------------------------
  game-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - game_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  gamification-service:
    build: ./services/gamification-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@game-db:5432/game_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      game-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Kisi 1: Identity Service (gateway CP3'te eklenecek) ---------------------------
  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  identity-service:
    build: ./services/identity-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@identity-db:5432/identity_db
    ports:
      - "8001:8001"
    depends_on:
      identity-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Kisi 3: Frontend ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"

volumes:
  incident_data: {}
  ai_data: {}
  game_data: {}
  identity_data: {}

networks:
  default:
    name: netopscell-net
