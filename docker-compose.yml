services:
  # --- Redis: event bus (Streams) --------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Kisi 2: Incident Service ------------------------------------------------------
  incident-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - incident_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  incident-service:
    build: ./services/incident-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@incident-db:5432/incident_db
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8003
    ports:
      - "8002:8002"
    depends_on:
      incident-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Kisi 2: AI Service --------------------------------------------------------------
  ai-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ai_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-service:
    build: ./services/ai-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@ai-db:5432/ai_db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: claude-sonnet-5
    ports:
      - "8003:8003"
    depends_on:
      ai-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Kisi 2: Gamification Service ---------------------------------------------------
  game-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - game_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  gamification-service:
    build: ./services/gamification-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@game-db:5432/game_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      game-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Kisi 1: identity-db, identity-service, gateway BURAYA eklenecek --------------
  # --- Kisi 3: frontend BURAYA eklenecek ---------------------------------------------

volumes:
  incident_data: {}
  ai_data: {}
  game_data: {}

networks:
  default:
    name: netopscell-net
